<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    Content-Security-Policy for the map iframe:
    - script-src 'self'          → only local extension scripts
    - style-src  'self' 'unsafe-inline' → Leaflet needs inline styles at runtime
    - img-src    'self' data: https:    → tile layers + listing images (HTTPS only)
    - connect-src 'none'         → map.js makes no direct network requests
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src  'self';
                 style-src   'self' 'unsafe-inline';
                 img-src     'self' data: https:;
                 connect-src 'none';">
  <title>WiKarte</title>
  <link rel="stylesheet" href="../vendor/leaflet.css">
  <link rel="stylesheet" href="../vendor/MarkerCluster.css">
  <link rel="stylesheet" href="../vendor/MarkerCluster.Default.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
    }
    #map {
      width: 100%;
      height: 100vh;
    }
    #status {
      position: absolute;
      bottom: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* Dark rounded control style — matches willhaben 8px radius */
    .leaflet-top.leaflet-left .leaflet-control {
      border: none !important;
      border-radius: 8px !important;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .leaflet-control-zoom a,
    .reset-view-btn {
      background: #2d2d3d !important;
      color: #ccc !important;
      border: none !important;
      width: 36px !important;
      height: 36px !important;
      font-size: 18px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      text-decoration: none;
      line-height: 1 !important;
    }
    .leaflet-control-zoom a:hover,
    .reset-view-btn:not(.wikarte-layer-btn):hover {
      background: #3a3a4e !important;
      color: white !important;
    }
    .leaflet-control-zoom-in {
      border-radius: 8px 8px 0 0 !important;
    }
    .leaflet-control-zoom-out {
      border-top: 1px solid #3a3a4a !important;
    }

    .wikarte-layer-stack.leaflet-control {
      margin-top: 8px;
    }
    .wikarte-layer-btn {
      position: relative;
      width: 36px !important;
      height: 36px !important;
      padding: 0 !important;
      background-size: cover !important;
      background-position: center !important;
      border-top: 1px solid #3a3a4a !important;
      overflow: hidden;
    }
    .wikarte-layer-stack .wikarte-layer-btn:first-child {
      border-top: none !important;
    }
    .wikarte-layer-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 2px solid transparent;
      pointer-events: none;
    }
    .wikarte-layer-btn:hover {
      background-color: transparent !important;
      color: inherit !important;
    }
    .wikarte-layer-btn-light {
      background-image: url('../../assets/layers/light.png') !important;
    }
    .wikarte-layer-btn-dark {
      background-image: url('../../assets/layers/dark.png') !important;
    }
    .wikarte-layer-btn-satellite {
      background-image: url('../../assets/layers/satellite.png') !important;
    }
    /* Price-tag markers */
    .price-marker {
      background: none !important;
      border: none !important;
    }
    .price-tag {
      background: white;
      color: #333;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      cursor: pointer;
      transform: translate(-50%, -50%);
    }
    .price-tag.wishlisted {
      background: #d4af37;
      color: white;
      box-shadow: 0 1px 6px rgba(212, 175, 55, 0.45);
    }
    .price-tag:hover {
      background: #4db8e8;
      color: white;
      transform: translate(-50%, -50%) scale(1.1);
    }
    .price-tag.highlighted,
    .price-tag.highlighted:hover {
      background: #3aaad9 !important;
      color: white !important;
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 0 2px 10px rgba(77, 184, 232, 0.4);
      z-index: 10000;
    }
    .price-tag.wishlisted:hover,
    .price-tag.highlighted.wishlisted,
    .price-tag.highlighted.wishlisted:hover {
      background: #3aaad9 !important;
      color: white !important;
      border: 2px solid #d4af37;
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 0 2px 10px rgba(77, 184, 232, 0.4), 0 0 0 1px rgba(212, 175, 55, 0.3);
    }

    /* Popups */
    .listing-popup {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 280px;
    }
    .leaflet-popup-content {
      margin: 13px !important;
    }
    .listing-popup img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 6px;
    }
    .listing-popup h3 {
      font-size: 13px;
      margin-bottom: 4px;
      line-height: 1.3;
      color: #333;
    }
    .listing-popup .price {
      font-size: 16px;
      font-weight: bold;
      color: #3aaad9;
      margin-bottom: 4px;
    }
    .listing-popup .details {
      font-size: 11px;
      color: #666;
      margin-bottom: 6px;
    }
    .listing-popup a {
      color: #3aaad9;
      text-decoration: none;
      font-size: 12px;
      font-weight: bold;
    }
    .listing-popup a:hover { text-decoration: underline; }

    /* ── Dark theme ─────────────────────────────────────────────────────────── */
    .dark-theme { background: #1a1a2e; }

    .dark-theme .price-tag {
      background: #2b2b3d;
      color: #ddd;
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
      border: 1px solid #3a3a4a;
    }
    .dark-theme .price-tag.wishlisted {
      background: #b99622;
      color: white;
      border-color: #d4af37;
      box-shadow: 0 1px 6px rgba(212, 175, 55, 0.35);
    }
    .dark-theme .price-tag:hover {
      background: #4db8e8;
      color: white;
    }
    .dark-theme .price-tag.highlighted,
    .dark-theme .price-tag.highlighted:hover {
      background: #3aaad9 !important;
      color: white !important;
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 0 2px 10px rgba(77, 184, 232, 0.35);
    }
    .dark-theme .price-tag.wishlisted:hover,
    .dark-theme .price-tag.highlighted.wishlisted,
    .dark-theme .price-tag.highlighted.wishlisted:hover {
      background: #3aaad9 !important;
      color: white !important;
      border: 2px solid #d4af37;
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 0 2px 10px rgba(77, 184, 232, 0.35), 0 0 0 1px rgba(212, 175, 55, 0.25);
    }
    .dark-theme #status { background: rgba(0,0,0,0.8); }

    .dark-theme .leaflet-popup-content-wrapper {
      background: #2b2b3d !important;
      color: #ddd !important;
    }
    .dark-theme .leaflet-popup-tip            { background: #2b2b3d !important; }
    .dark-theme .listing-popup h3             { color: #eee; }
    .dark-theme .listing-popup .details       { color: #999; }

    body.wikarte-satellite-active .price-tag {
      background: white;
      color: #333;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      border: none;
    }
    body.wikarte-satellite-active .price-tag.wishlisted {
      background: #d4af37;
      color: white;
      box-shadow: 0 1px 6px rgba(212, 175, 55, 0.45);
      border: none;
    }
    body.wikarte-satellite-active .leaflet-popup-content-wrapper,
    body.dark-theme.wikarte-satellite-active .leaflet-popup-content-wrapper,
    body.wikarte-satellite-active .leaflet-popup-tip,
    body.dark-theme.wikarte-satellite-active .leaflet-popup-tip {
      background: white !important;
      color: #333 !important;
    }
    body.wikarte-satellite-active .listing-popup,
    body.dark-theme.wikarte-satellite-active .listing-popup {
      color: #333 !important;
    }
    body.wikarte-satellite-active .listing-popup h3,
    body.dark-theme.wikarte-satellite-active .listing-popup h3 {
      color: #333 !important;
    }
    body.wikarte-satellite-active .listing-popup .price,
    body.dark-theme.wikarte-satellite-active .listing-popup .price {
      color: #3aaad9 !important;
    }
    body.wikarte-satellite-active .listing-popup .details,
    body.dark-theme.wikarte-satellite-active .listing-popup .details {
      color: #666 !important;
    }
    body.wikarte-satellite-active .listing-popup a,
    body.dark-theme.wikarte-satellite-active .listing-popup a {
      color: #3aaad9 !important;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="status">Waiting for listings...</div>

  <script src="../vendor/leaflet.js"></script>
  <script src="../vendor/leaflet.markercluster.js"></script>
  <script src="../data/postcodes.js"></script>
  <script src="../data/austria-border.js"></script>
  <script src="../data/vienna-districts.js"></script>
  <script src="map.js"></script>
</body>
</html>
